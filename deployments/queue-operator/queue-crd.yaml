---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    api-approved.kubernetes.io: https://github.com/kubernetes/enhancements/pull/1111
    controller-gen.kubebuilder.io/version: v0.19.0
  name: queues.queue.yunikorn.k8s.io
spec:
  group: queue.yunikorn.k8s.io
  names:
    kind: Queue
    listKind: QueueList
    plural: queues
    singular: queue
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.conditions[?(@.type=='Available')].status
      name: Available
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: Queue is the Schema for the queues API
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: spec defines the desired state of Queue
            properties:
              queue:
                description: |-
                  Queue defines the queue hierarchy configuration.
                  This mirrors YuniKorn's QueueConfig structure and contains the L1 parent queue
                  along with all its child queues in a nested structure.
                  The queue name should match the Queue CR name (metadata.name).
                properties:
                  adminACL:
                    description: |-
                      AdminACL defines who can perform admin operations on this queue.
                      Format: space-separated list of users/groups (e.g., " admin", " group-a")
                    type: string
                  childTemplate:
                    description: ChildTemplate defines a template for auto-created
                      child queues via placement rules.
                    properties:
                      maxApplications:
                        description: MaxApplications is the maximum number of applications
                          for auto-created child queues.
                        format: int64
                        minimum: 0
                        type: integer
                      properties:
                        additionalProperties:
                          type: string
                        description: Properties are properties to be applied to auto-created
                          child queues.
                        type: object
                      resources:
                        description: Resources are resources to be applied to auto-created
                          child queues.
                        properties:
                          guaranteed:
                            additionalProperties:
                              type: string
                            description: |-
                              Guaranteed resources are the minimum resources reserved for this queue.
                              Resources are specified as a map of resource name to quantity string.
                              Common resources: "memory" (e.g., "2G", "1000Mi"), "vcore" (e.g., "2", "1000m")
                            type: object
                          max:
                            additionalProperties:
                              type: string
                            description: |-
                              Max resources are the maximum resources this queue can use.
                              Resources are specified as a map of resource name to quantity string.
                              Common resources: "memory" (e.g., "6G", "1000Mi"), "vcore" (e.g., "6", "1000m")
                            type: object
                        type: object
                    type: object
                  limits:
                    description: Limits defines user and group-specific limits for
                      this queue.
                    items:
                      description: Limit defines user and group-specific limits for
                        a queue or partition.
                      properties:
                        groups:
                          description: |-
                            Groups is a list of groups this limit applies to.
                            If exactly one group is specified, it is interpreted as a regular expression.
                          items:
                            type: string
                          type: array
                        limit:
                          description: Limit is a description of this limit entry.
                          minLength: 1
                          type: string
                        maxApplications:
                          description: MaxApplications is the maximum number of applications
                            the user/group can have running.
                          format: int64
                          minimum: 0
                          type: integer
                        maxResources:
                          additionalProperties:
                            type: string
                          description: |-
                            MaxResources defines the maximum resources allowed for the user/group.
                            Resources are specified as a map of resource name to quantity string.
                          type: object
                        users:
                          description: |-
                            Users is a list of users this limit applies to.
                            If exactly one user is specified, it is interpreted as a regular expression.
                          items:
                            type: string
                          type: array
                      required:
                      - limit
                      type: object
                    type: array
                  maxApplications:
                    description: MaxApplications is the maximum number of applications
                      that can run in this queue.
                    format: int64
                    minimum: 0
                    type: integer
                  name:
                    description: |-
                      Name is the name of the queue.
                      For L1 parent queues, this should match the Queue CR name (metadata.name).
                    maxLength: 253
                    minLength: 1
                    pattern: ^[a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*$
                    type: string
                  parent:
                    description: Parent indicates if this queue is a parent queue
                      (can have children).
                    type: boolean
                  properties:
                    additionalProperties:
                      type: string
                    description: |-
                      Properties is a map of key-value properties for queue behavior configuration.
                      Common properties include:
                      - application.sort.policy: "fifo", "fair", "stateaware"
                      - application.sort.priority: "enabled"
                      - priority.offset: priority offset value (e.g., "1000", "-1000")
                      - priority.policy: "fence" (prevents preemption)
                      - preemption.policy: "fence"
                      - preemption.delay: delay duration (e.g., "10s")
                    type: object
                  queues:
                    description: |-
                      Queues is a list of child queues. This allows for nested queue hierarchies.
                      The structure is recursive - child queues can themselves have child queues.
                    items:
                      type: object
                      x-kubernetes-preserve-unknown-fields: true
                    type: array
                    x-kubernetes-list-type: atomic
                  resources:
                    description: Resources defines resource limits and guarantees
                      for the queue.
                    properties:
                      guaranteed:
                        additionalProperties:
                          type: string
                        description: |-
                          Guaranteed resources are the minimum resources reserved for this queue.
                          Resources are specified as a map of resource name to quantity string.
                          Common resources: "memory" (e.g., "2G", "1000Mi"), "vcore" (e.g., "2", "1000m")
                        type: object
                      max:
                        additionalProperties:
                          type: string
                        description: |-
                          Max resources are the maximum resources this queue can use.
                          Resources are specified as a map of resource name to quantity string.
                          Common resources: "memory" (e.g., "6G", "1000Mi"), "vcore" (e.g., "6", "1000m")
                        type: object
                    type: object
                  submitACL:
                    description: |-
                      SubmitACL defines who can submit applications to this queue.
                      Format: space-separated list of users/groups (e.g., "*", " admin", " group-a")
                      Use "*" to allow all users.
                    type: string
                required:
                - name
                type: object
            required:
            - queue
            type: object
          status:
            description: status defines the observed state of Queue
            properties:
              conditions:
                description: |-
                  conditions represent the current state of the Queue resource.
                  Condition types: "Available" (queue in ConfigMap), "Degraded" (queue excluded).
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              observedGeneration:
                description: |-
                  observedGeneration is the most recent generation observed by the controller.
                  It corresponds to the Queue's generation, which is updated on mutation by the API Server.
                format: int64
                type: integer
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
