apiVersion: v1
kind: ConfigMap
metadata:
  name: yunikorn-configs
  namespace: yunikorn
data:
  queues.yaml: |
    partitions:
      - name: default
        placementrules:
          - name: provided
            create: true
        preemption:
          enabled: true
          # Enabling quota preemption
          quotapreemptionenabled: true
        queues:
          - name: root
            submitacl: '*'
            queues:
              - name: parent
                resources:
                  max:
                    memory: 400Mi
                    vcore: 400m
                queues:
                  - name: queue-a
                    resources:
                      guaranteed:
                        memory: 200Mi
                        vcore: 200m
                      max:
                        memory: 400Mi
                        vcore: 400m
                    properties:
                      # Quota preemption in a queue requires delay to be set
                      quota.preemption.delay: 10s
                  - name: queue-b # No quota preemption for queue-b as delay is not set
                    resources:
                      guaranteed:
                        memory: 200Mi
                        vcore: 200m
                      max:
                        memory: 400Mi
                        vcore: 400m