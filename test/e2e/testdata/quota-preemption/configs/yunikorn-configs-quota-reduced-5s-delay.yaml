#
# Quota is reduced to 200Mi (below 3-pod usage of 300Mi) with a 5s preemption
# delay. Used as the initial violation trigger in the delay-timer-reset test.
apiVersion: v1
kind: ConfigMap
metadata:
  name: yunikorn-configs
  namespace: yunikorn
data:
  log.level: DEBUG
  queues.yaml: |
    partitions:
      - name: default
        preemption:
          enabled: true
          quotapreemptionenabled: true
        queues:
          - name: root
            submitacl: '*'
            queues:
              - name: parent
                resources:
                  max:
                    memory: 300Mi
                    vcore: 300m
                queues:
                  - name: queue-a
                    resources:
                      guaranteed:
                        memory: 100Mi
                        vcore: 100m
                      max:
                        memory: 200Mi
                        vcore: 200m
                    properties:
                      quota.preemption.delay: 5s
